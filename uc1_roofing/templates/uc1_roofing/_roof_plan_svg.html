{# Reusable roof-outline SVG render — used by quote_print.html and quote_detail.html.
   Requires `quote` in context (with roof_polygon_json + roof_sections_json).
   Optional context vars:
     plan_svg_id     — DOM id for the <svg> element (default 'roofPlanSvg')
     plan_height     — pixel height (default 220)
#}
<svg id="{{ plan_svg_id|default:'roofPlanSvg' }}"
     width="100%" height="{{ plan_height|default:220 }}"
     style="display:block;background:#fafafa;border-radius:6px;"></svg>

<script>
(function() {
  var rawPoly = '{{ quote.roof_polygon_json|escapejs }}';
  var rawSecs = '{{ quote.roof_sections_json|escapejs }}';
  var polygon  = []; var sections = [];
  try { polygon  = JSON.parse(rawPoly); } catch(e) {}
  try { sections = JSON.parse(rawSecs); } catch(e) {}

  var FACING_COLORS = {
    'N':'#2196F3','NE':'#00BCD4','E':'#4CAF50','SE':'#8BC34A',
    'S':'#FF9800','SW':'#FF5722','W':'#9C27B0','NW':'#3F51B5'
  };

  var svg = document.getElementById('{{ plan_svg_id|default:"roofPlanSvg" }}');
  if (!svg) return;
  var W   = svg.parentElement.clientWidth || 700;
  var H   = {{ plan_height|default:220 }};
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

  function ns(tag, attrs) {
    var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (var k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }
  function txt(tag, attrs, label) {
    var el = ns(tag, attrs); el.textContent = label; return el;
  }

  function project(pts, pad) {
    if (!pts || pts.length < 3) return null;
    var minLat=Infinity,maxLat=-Infinity,minLon=Infinity,maxLon=-Infinity;
    pts.forEach(function(p){
      if(p[0]<minLat)minLat=p[0]; if(p[0]>maxLat)maxLat=p[0];
      if(p[1]<minLon)minLon=p[1]; if(p[1]>maxLon)maxLon=p[1];
    });
    var dLat=maxLat-minLat||0.0001, dLon=maxLon-minLon||0.0001;
    var cosLat=Math.cos((minLat+maxLat)/2*Math.PI/180);
    var dLonM=dLon*cosLat;
    var scale=Math.min((W-2*pad)/dLonM,(H-2*pad)/dLat);
    var offX=(W-dLonM*scale)/2, offY=(H-dLat*scale)/2;
    return {
      toXY:function(lat,lon){
        return [offX+(lon-minLon)*cosLat*scale, H-offY-(lat-minLat)*scale];
      },
      minLat:minLat,maxLat:maxLat,minLon:minLon,maxLon:maxLon,
      cosLat:cosLat,scale:scale
    };
  }

  function drawCompass(cx, cy, r) {
    var g = ns('g',{});
    g.appendChild(ns('circle',{cx:cx,cy:cy,r:r,fill:'#fff',stroke:'#bbb','stroke-width':'0.8'}));
    g.appendChild(ns('polygon',{
      points:cx+','+(cy-r+3)+' '+(cx-3.5)+','+(cy+3)+' '+(cx+3.5)+','+(cy+3),
      fill:'#c0392b'}));
    g.appendChild(ns('polygon',{
      points:cx+','+(cy+r-3)+' '+(cx-3)+','+(cy-3)+' '+(cx+3)+','+(cy-3),
      fill:'#aaa'}));
    g.appendChild(txt('text',{x:cx,y:cy-r-4,'text-anchor':'middle',
      'font-size':'9','font-weight':'bold',fill:'#c0392b','font-family':'Arial'},'N'));
    svg.appendChild(g);
  }

  if (!polygon || polygon.length < 3) {
    svg.appendChild(txt('text',{x:W/2,y:H/2,'text-anchor':'middle',
      'font-size':'11',fill:'#bbb','font-family':'Arial','font-style':'italic'},
      'Roof plan not available — address a property and save a new quote to capture it'));
    return;
  }

  var proj = project(polygon, 32);
  if (!proj) return;

  var validSecs = (sections||[]).filter(function(s){
    return s.bbox && s.bbox.sw && s.bbox.ne &&
           (Math.abs(s.bbox.sw.lat)>0.001||Math.abs(s.bbox.sw.lng)>0.001);
  });
  validSecs.forEach(function(sec){
    var sw=sec.bbox.sw, ne=sec.bbox.ne;
    var xy1=proj.toXY(sw.lat,sw.lng), xy2=proj.toXY(ne.lat,ne.lng);
    var x=Math.min(xy1[0],xy2[0]), y=Math.min(xy1[1],xy2[1]);
    var w=Math.abs(xy2[0]-xy1[0]), h=Math.abs(xy2[1]-xy1[1]);
    if(w<2||h<2) return;
    var color=FACING_COLORS[sec.facing]||'#90A4AE';
    svg.appendChild(ns('rect',{x:x,y:y,width:w,height:h,
      fill:color,'fill-opacity':'0.22',stroke:color,'stroke-width':'0.8','stroke-opacity':'0.55'}));
    var lx=(xy1[0]+xy2[0])/2, ly=(xy1[1]+xy2[1])/2;
    svg.appendChild(txt('text',{x:lx,y:ly-4,'text-anchor':'middle',
      'font-size':'7.5','font-weight':'bold',fill:color,'font-family':'Arial'},sec.facing||''));
    if(sec.area_m2)
      svg.appendChild(txt('text',{x:lx,y:ly+6,'text-anchor':'middle',
        'font-size':'7',fill:color,'font-family':'Arial'},Math.round(sec.area_m2)+' m²'));
  });

  var polyPts = polygon.map(function(p){
    var xy=proj.toXY(p[0],p[1]); return xy[0]+','+xy[1];
  }).join(' ');
  svg.appendChild(ns('polygon',{points:polyPts,
    fill:'#E8F5E9',stroke:'#27ae60','stroke-width':'2.5','stroke-linejoin':'round'}));

  var R=6378137;
  var spanLon=Math.round((proj.maxLon-proj.minLon)*proj.cosLat*Math.PI/180*R);
  var spanLat=Math.round((proj.maxLat-proj.minLat)*Math.PI/180*R);
  svg.appendChild(txt('text',{x:W/2,y:H-5,'text-anchor':'middle',
    'font-size':'8.5',fill:'#666','font-family':'Arial'},
    spanLon+' m (E–W)  ×  '+spanLat+' m (N–S)'));

  drawCompass(W-22, 22, 17);

  if(validSecs.length>0){
    var lx=8;
    validSecs.forEach(function(sec){
      if(!sec.facing)return;
      var color=FACING_COLORS[sec.facing]||'#90A4AE';
      svg.appendChild(ns('rect',{x:lx,y:H-17,width:8,height:8,
        fill:color,'fill-opacity':'0.75',rx:'1'}));
      svg.appendChild(txt('text',{x:lx+10,y:H-11,'font-size':'7.5',
        fill:'#444','font-family':'Arial'},
        sec.facing+(sec.area_m2?' '+Math.round(sec.area_m2)+'m²':'')));
      lx+=50;
    });
  }
})();
</script>
